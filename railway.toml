[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
```

---

## Paso 4 — Guardar y subir los cambios

1. En el panel izquierdo, click en el ícono de **Source Control** (el que parece un árbol con ramas, tercero desde arriba)
2. En el campo **"Message"** escribí: `primer commit`
3. Click en **"Commit & Push"**
4. Si te pregunta algo, click **"Yes"** o **"Always"**

Los archivos ya están en tu repo de GitHub ✓

---

## Paso 5 — Crear cuenta en Railway

1. Entrá a [railway.app](https://railway.app)
2. Click **"Login"** → **"Login with GitHub"**
3. Autorizá Railway para acceder a tu cuenta de GitHub

---

## Paso 6 — Deployar

1. En Railway, click **"New Project"**
2. Elegí **"Deploy from GitHub repo"**
3. Seleccioná **`zonajobs-scraper`**
4. Railway detecta el `Dockerfile` automáticamente y empieza a buildear
5. Esperás ~2 minutos mientras aparece el log de construcción

---

## Paso 7 — Obtener tu URL pública

1. Una vez que el deploy termina (ves **"Success"** en verde), click en tu servicio
2. Ir a la pestaña **"Settings"** → sección **"Networking"**
3. Click **"Generate Domain"**
4. Te da una URL del tipo `zonajobs-scraper-production.up.railway.app`

---

## Paso 8 — Probar que funciona

Abrí en el browser:
```
https://TU-URL.up.railway.app/jobs?q=tecnico+seguridad+higiene&l=Buenos+Aires
```

Deberías ver un JSON con los empleos. También podés ir a:
```
https://TU-URL.up.railway.app/docs
